name: Liberty Echo CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
jobs:
  branding-check:
    name: "Branding Gate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for vendor references in frontend
        run: |
          FOUND=0
          for pattern in "elevenlabs.io" "ElevenLabs" "eleven_labs" "eleven-labs"; do
            matches=$(grep -rn "$pattern" client/src \
              --include="*.tsx" --include="*.ts" --include="*.jsx" --include="*.js" \
              --exclude-dir=node_modules 2>/dev/null || true)
            if [ -n "$matches" ]; then echo "BLOCKED: $pattern"; FOUND=1; fi
          done
          [ $FOUND -eq 0 ] && echo "Branding gate passed" || exit 1
  node-build:
    name: "Node.js Build + TypeScript"
    runs-on: ubuntu-latest
    needs: branding-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1
  python-check:
    name: "Python API Check"
    runs-on: ubuntu-latest
    needs: branding-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - run: pip install -r api/requirements.txt
      - name: Compile check
        run: |
          find api -name "*.py" | while read f; do
            python -m py_compile "$f" || exit 1
          done
  secret-scan:
    name: "Secret Scanning"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
  docker-build:
    name: "Docker Build Test"
    runs-on: ubuntu-latest
    needs: [node-build, python-check]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t liberty-echo:latest .
      - name: Verify image starts
        run: |
          docker run --rm -d \
            -e DATABASE_URL="postgresql://test:test@localhost:5432/test" \
            -e SESSION_SECRET="ci-test-secret" \
            -e NODE_ENV="production" \
            --name le-test -p 5000:5000 liberty-echo:latest || true
          sleep 3
          docker stop le-test 2>/dev/null || true
          echo "Docker image OK"
