name: Liberty Echo Deploy
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
env:
  GCP_PROJECT: liberty-echo-prod
  GCP_REGION: us-central1
  GAR_REGISTRY: us-central1-docker.pkg.dev
  IMAGE_NAME: liberty-echo
jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GAR_REGISTRY }}
      - name: Build Docker image
        run: |
          docker build -t ${{ env.GAR_REGISTRY }}/${{ env.GCP_PROJECT }}/docker/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.GAR_REGISTRY }}/${{ env.GCP_PROJECT }}/docker/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ env.GAR_REGISTRY }}/${{ env.GCP_PROJECT }}/docker/${{ env.IMAGE_NAME }}:latest
      - name: Push to Artifact Registry
        run: |
          docker push ${{ env.GAR_REGISTRY }}/${{ env.GCP_PROJECT }}/docker/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.GAR_REGISTRY }}/${{ env.GCP_PROJECT }}/docker/${{ env.IMAGE_NAME }}:latest
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy liberty-echo \
            --image=${{ env.GAR_REGISTRY }}/${{ env.GCP_PROJECT }}/docker/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --port 5000 \
            --memory 2Gi \
            --cpu 2 \
            --timeout 3600 \
            --set-env-vars="NODE_ENV=production" \
            --allow-unauthenticated
      - name: Output service URL
        run: |
          URL=$(gcloud run services describe liberty-echo \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --format="value(status.url)")
          echo "Service deployed to: $URL"
          echo "SERVICE_URL=$URL" >> $GITHUB_OUTPUT
